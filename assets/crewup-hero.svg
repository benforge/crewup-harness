<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CrewUp workflow harness</title>
  <desc id="desc">A minimal white and blue product illustration showing CrewUp as an explicit orchestration harness with delegated agents, gated artifacts, and auditable run state.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B5FFF"/>
      <stop offset="1" stop-color="#1EA7FF"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EAF4FF"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0A2D68" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#D9E8FF" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#FFFFFF"/>
  <rect x="40" y="40" width="1200" height="560" rx="36" fill="#F7FBFF"/>
  <rect x="40" y="40" width="1200" height="560" rx="36" fill="url(#grid)" opacity="0.42"/>
  <rect x="40" y="40" width="1200" height="560" rx="36" stroke="#DCEBFF"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="88" y="132" fill="#07111F" font-size="70" font-weight="850">CrewUp</text>
    <text x="92" y="178" fill="#2B527B" font-size="24" font-weight="650">Strict AI workflow harness for large engineering projects</text>
    <text x="92" y="214" fill="#597A9D" font-size="17" font-weight="520">Opt in explicitly. Delegate formal work. Gate every handoff.</text>

    <g transform="translate(92 260)">
      <rect width="132" height="42" rx="21" fill="#07111F"/>
      <circle cx="26" cy="21" r="6" fill="#35C2FF"/>
      <text x="44" y="27" fill="#FFFFFF" font-size="14" font-weight="800">opt-in</text>
    </g>
    <g transform="translate(240 260)">
      <rect width="158" height="42" rx="21" fill="#FFFFFF" stroke="#B9D8FF"/>
      <path d="M25 21H41M33 13V29" stroke="#0B5FFF" stroke-width="2.5" stroke-linecap="round"/>
      <text x="54" y="27" fill="#102A43" font-size="14" font-weight="800">orchestrate</text>
    </g>
    <g transform="translate(414 260)">
      <rect width="126" height="42" rx="21" fill="#FFFFFF" stroke="#B9D8FF"/>
      <path d="M25 21L34 29L49 13" stroke="#0B5FFF" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="62" y="27" fill="#102A43" font-size="14" font-weight="800">gate</text>
    </g>
  </g>

  <g transform="translate(88 404)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="0" y="0" fill="#0B5FFF" font-size="12" font-weight="850">RUN PROFILES</text>
    <rect x="0" y="24" width="106" height="40" rx="20" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="22" y="50" fill="#102A43" font-size="14" font-weight="800">discovery</text>
    <rect x="120" y="24" width="106" height="40" rx="20" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="146" y="50" fill="#102A43" font-size="14" font-weight="800">plan_only</text>
    <rect x="240" y="24" width="92" height="40" rx="20" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="271" y="50" fill="#102A43" font-size="14" font-weight="800">lite</text>
    <rect x="346" y="24" width="112" height="40" rx="20" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="371" y="50" fill="#102A43" font-size="14" font-weight="800">standard</text>
    <rect x="472" y="24" width="78" height="40" rx="20" fill="url(#blue)"/>
    <text x="496" y="50" fill="#FFFFFF" font-size="14" font-weight="850">full</text>
  </g>

  <g transform="translate(594 88)" filter="url(#panelShadow)">
    <rect width="520" height="456" rx="30" fill="#FFFFFF"/>
    <rect x="1" y="1" width="518" height="454" rx="29" stroke="#C9DFFF"/>
    <rect x="24" y="24" width="472" height="56" rx="18" fill="#07111F"/>
    <circle cx="52" cy="52" r="7" fill="#FFFFFF"/>
    <circle cx="76" cy="52" r="7" fill="#35C2FF"/>
    <circle cx="100" cy="52" r="7" fill="#0B5FFF"/>
    <text x="132" y="58" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">crewup run</text>
  </g>

  <g transform="translate(640 144)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="192" height="310" rx="24" fill="url(#softBlue)" stroke="#C9DFFF"/>
    <text x="26" y="40" fill="#07111F" font-size="18" font-weight="850">Main agent</text>
    <text x="26" y="66" fill="#557393" font-size="13" font-weight="650">routes, delegates, gates</text>

    <rect x="26" y="104" width="140" height="40" rx="13" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="48" y="130" fill="#102A43" font-size="13" font-weight="800">prepare run</text>
    <rect x="26" y="160" width="140" height="40" rx="13" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="50" y="186" fill="#102A43" font-size="13" font-weight="800">assign tasks</text>
    <rect x="26" y="216" width="140" height="40" rx="13" fill="#FFFFFF" stroke="#C7DEFF"/>
    <text x="52" y="242" fill="#102A43" font-size="13" font-weight="800">check gates</text>
  </g>

  <g transform="translate(882 142)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <path d="M0 80H36M0 152H36M0 224H36" stroke="#0B5FFF" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="36" y="28" width="198" height="64" rx="18" fill="#FFFFFF" stroke="#B9D8FF"/>
    <text x="60" y="55" fill="#07111F" font-size="14" font-weight="850">requirements</text>
    <text x="60" y="76" fill="#5B7898" font-size="12" font-weight="650">scope and ACs</text>

    <rect x="36" y="108" width="198" height="64" rx="18" fill="#FFFFFF" stroke="#B9D8FF"/>
    <text x="60" y="135" fill="#07111F" font-size="14" font-weight="850">architect / builder</text>
    <text x="60" y="156" fill="#5B7898" font-size="12" font-weight="650">plan and implementation</text>

    <rect x="36" y="188" width="198" height="64" rx="18" fill="#FFFFFF" stroke="#B9D8FF"/>
    <text x="60" y="215" fill="#07111F" font-size="14" font-weight="850">tester / reviewer</text>
    <text x="60" y="236" fill="#5B7898" font-size="12" font-weight="650">evidence and risk</text>

    <rect x="36" y="268" width="198" height="64" rx="18" fill="#07111F"/>
    <path d="M62 300L73 311L94 288" stroke="#35C2FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="303" fill="#FFFFFF" font-size="14" font-weight="850">release summary</text>
    <text x="112" y="323" fill="#B8D7FF" font-size="12" font-weight="650">auditable archive</text>
  </g>

  <g transform="translate(742 500)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="302" height="54" rx="27" fill="#FFFFFF" stroke="#C9DFFF"/>
    <path d="M31 27L44 40L68 16" stroke="#0B5FFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="33" fill="#07111F" font-size="15" font-weight="850">artifact provenance checked</text>
  </g>
</svg>
