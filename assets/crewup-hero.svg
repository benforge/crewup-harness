<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CrewUp AI harness</title>
  <desc id="desc">A minimal blue, white, and black brand hero for CrewUp, showing a focused AI harness command surface for large engineering workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#05070C"/>
      <stop offset="0.52" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#061A34"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8ED8FF"/>
      <stop offset="0.45" stop-color="#2E8CFF"/>
      <stop offset="1" stop-color="#0957D8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop stop-color="#2E8CFF" stop-opacity="0.45"/>
      <stop offset="0.52" stop-color="#2E8CFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2E8CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-35%" width="160%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="blueGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.72 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="838" cy="307" r="280" fill="url(#halo)"/>
  <path d="M84 536C248 448 383 590 535 493C703 386 784 402 942 461C1056 503 1141 483 1210 422" stroke="#2E8CFF" stroke-opacity="0.2" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="96" y="142" fill="#FFFFFF" font-size="72" font-weight="800">CrewUp</text>
    <text x="100" y="188" fill="#B9D3F5" font-size="24" font-weight="500">AI harness for large project work.</text>

    <g transform="translate(100 238)">
      <rect x="0" y="0" width="126" height="38" rx="19" fill="#FFFFFF"/>
      <circle cx="24" cy="19" r="6" fill="#0B62FF"/>
      <text x="42" y="25" fill="#07101F" font-size="14" font-weight="800">opt-in</text>
    </g>
    <g transform="translate(240 238)">
      <rect x="0" y="0" width="150" height="38" rx="19" fill="#0E1A31" stroke="#244A86"/>
      <text x="27" y="25" fill="#EAF4FF" font-size="14" font-weight="750">orchestrator</text>
    </g>
    <g transform="translate(404 238)">
      <rect x="0" y="0" width="96" height="38" rx="19" fill="#0E1A31" stroke="#244A86"/>
      <text x="28" y="25" fill="#EAF4FF" font-size="14" font-weight="750">gates</text>
    </g>

    <g transform="translate(100 428)">
      <text x="0" y="0" fill="#6F95C9" font-size="12" font-weight="800" letter-spacing="2">STRICT PROFILES</text>
      <text x="0" y="40" fill="#FFFFFF" font-size="21" font-weight="750">discovery</text>
      <text x="124" y="40" fill="#FFFFFF" font-size="21" font-weight="750">plan_only</text>
      <text x="260" y="40" fill="#FFFFFF" font-size="21" font-weight="750">standard</text>
      <text x="378" y="40" fill="#FFFFFF" font-size="21" font-weight="750">full</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="92" width="558" height="456" rx="36" fill="#07101F" stroke="#1E3C70"/>
    <rect x="632" y="114" width="514" height="412" rx="26" fill="#0B1426" stroke="#1B335B"/>
  </g>

  <g transform="translate(666 154)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="446" height="58" rx="20" fill="#0F1D35" stroke="#274D85"/>
    <circle cx="28" cy="29" r="7" fill="#FFFFFF"/>
    <circle cx="54" cy="29" r="7" fill="#2E8CFF"/>
    <circle cx="80" cy="29" r="7" fill="#0B62FF"/>
    <text x="116" y="36" fill="#F4F9FF" font-size="15" font-weight="800">crewup harness</text>
  </g>

  <g transform="translate(692 246)">
    <circle cx="186" cy="118" r="148" fill="#091426" stroke="#193864"/>
    <circle cx="186" cy="118" r="108" fill="#0C1B33" stroke="#285A9E" stroke-dasharray="4 12"/>
    <circle cx="186" cy="118" r="62" fill="#07101F" stroke="#3B92FF" stroke-width="2"/>
    <circle cx="186" cy="118" r="38" fill="url(#blue)" filter="url(#blueGlow)"/>

    <path d="M169 118C169 101 180 91 195 91C212 91 224 103 224 120C224 138 211 150 191 150H147V78H193C226 78 248 96 248 122C248 152 225 172 191 172H126V64H194" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">
      <rect x="0" y="38" width="118" height="34" rx="17" fill="#FFFFFF"/>
      <text x="21" y="60" fill="#07101F">requirements</text>

      <rect x="255" y="16" width="104" height="34" rx="17" fill="#10223F" stroke="#2C61AA"/>
      <text x="278" y="38" fill="#EAF4FF">architect</text>

      <rect x="268" y="176" width="92" height="34" rx="17" fill="#FFFFFF"/>
      <text x="292" y="198" fill="#07101F">builder</text>

      <rect x="14" y="182" width="82" height="34" rx="17" fill="#10223F" stroke="#2C61AA"/>
      <text x="35" y="204" fill="#EAF4FF">tester</text>
    </g>

    <path d="M118 70C140 86 154 96 165 105" stroke="#3B92FF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M256 51C235 71 216 86 205 101" stroke="#3B92FF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M276 178C243 160 221 146 205 133" stroke="#3B92FF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M96 184C123 162 144 147 166 133" stroke="#3B92FF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g transform="translate(983 286)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="112" height="84" rx="22" fill="url(#panel)"/>
    <text x="24" y="35" fill="#07101F" font-size="16" font-weight="850">runner</text>
    <text x="24" y="58" fill="#315071" font-size="12" font-weight="700">native / bridge</text>
  </g>

  <g transform="translate(770 482)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="258" height="48" rx="24" fill="#FFFFFF"/>
    <circle cx="30" cy="24" r="7" fill="#0B62FF"/>
    <text x="52" y="30" fill="#07101F" font-size="14" font-weight="850">provenance checked</text>
    <path d="M192 24H226" stroke="#07101F" stroke-width="2" stroke-linecap="round"/>
    <path d="M218 17L226 24L218 31" stroke="#07101F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
