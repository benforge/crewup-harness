<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CrewUp stable AI workflow architecture</title>
  <desc id="desc">CrewUp turns AI coding into an explicit run lifecycle with orchestrated agents, gated artifacts, compact memory hints, and auditable closeout.</desc>
  <defs>
    <linearGradient id="ink" x1="120" y1="82" x2="1110" y2="545" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#243B53"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1463FF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0B1F3A" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#DDEAF7" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#FFFFFF"/>
  <rect x="36" y="36" width="1208" height="568" rx="36" fill="#F7FBFF"/>
  <rect x="36" y="36" width="1208" height="568" rx="36" fill="url(#grid)" opacity="0.42"/>
  <rect x="36" y="36" width="1208" height="568" rx="36" stroke="#D6E6F7"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="82" y="124" fill="url(#ink)" font-size="68" font-weight="850">CrewUp</text>
    <text x="86" y="170" fill="#335C81" font-size="24" font-weight="650">Stable AI workflow harness for serious engineering work</text>
    <text x="86" y="208" fill="#5E7C9A" font-size="17" font-weight="520">Explicit runs. Delegated owners. Verifiable gates. Compact reusable memory.</text>

    <g transform="translate(86 252)">
      <rect width="124" height="42" rx="21" fill="#111827"/>
      <circle cx="27" cy="21" r="6" fill="#14B8A6"/>
      <text x="46" y="27" fill="#FFFFFF" font-size="14" font-weight="800">opt-in</text>
    </g>
    <g transform="translate(226 252)">
      <rect width="132" height="42" rx="21" fill="#FFFFFF" stroke="#B9D5F2"/>
      <path d="M25 21H45M35 11V31" stroke="#1463FF" stroke-width="2.6" stroke-linecap="round"/>
      <text x="60" y="27" fill="#102A43" font-size="14" font-weight="800">run</text>
    </g>
    <g transform="translate(374 252)">
      <rect width="156" height="42" rx="21" fill="#FFFFFF" stroke="#B9D5F2"/>
      <path d="M25 22L34 31L52 13" stroke="#14B8A6" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="68" y="27" fill="#102A43" font-size="14" font-weight="800">gate</text>
    </g>
  </g>

  <g transform="translate(84 402)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="0" y="0" fill="#1463FF" font-size="12" font-weight="850">PUBLIC SURFACE</text>
    <rect x="0" y="24" width="86" height="38" rx="19" fill="#FFFFFF" stroke="#C4D9EF"/>
    <text x="24" y="49" fill="#102A43" font-size="13" font-weight="800">run</text>
    <rect x="100" y="24" width="96" height="38" rx="19" fill="#FFFFFF" stroke="#C4D9EF"/>
    <text x="121" y="49" fill="#102A43" font-size="13" font-weight="800">drive</text>
    <rect x="210" y="24" width="126" height="38" rx="19" fill="#FFFFFF" stroke="#C4D9EF"/>
    <text x="233" y="49" fill="#102A43" font-size="13" font-weight="800">next-agent</text>
    <rect x="350" y="24" width="116" height="38" rx="19" fill="#FFFFFF" stroke="#C4D9EF"/>
    <text x="374" y="49" fill="#102A43" font-size="13" font-weight="800">finish</text>
    <rect x="480" y="24" width="112" height="38" rx="19" fill="url(#blue)"/>
    <text x="504" y="49" fill="#FFFFFF" font-size="13" font-weight="850">learn</text>
  </g>

  <g transform="translate(590 78)" filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="548" height="472" rx="30" fill="url(#panel)"/>
    <rect x="1" y="1" width="546" height="470" rx="29" stroke="#C9DCEF"/>
    <rect x="28" y="26" width="492" height="58" rx="18" fill="#111827"/>
    <circle cx="58" cy="55" r="7" fill="#FFFFFF"/>
    <circle cx="82" cy="55" r="7" fill="#14B8A6"/>
    <circle cx="106" cy="55" r="7" fill="#1463FF"/>
    <text x="138" y="61" fill="#FFFFFF" font-size="15" font-weight="850">crewup run --mode=strict</text>

    <g transform="translate(38 116)">
      <rect width="180" height="264" rx="24" fill="#EEF6FF" stroke="#C4D9EF"/>
      <text x="24" y="38" fill="#111827" font-size="18" font-weight="850">Main agent</text>
      <text x="24" y="64" fill="#55718D" font-size="13" font-weight="650">orchestrates only</text>
      <rect x="24" y="96" width="132" height="38" rx="12" fill="#FFFFFF" stroke="#C4D9EF"/>
      <text x="46" y="121" fill="#102A43" font-size="13" font-weight="800">route</text>
      <rect x="24" y="150" width="132" height="38" rx="12" fill="#FFFFFF" stroke="#C4D9EF"/>
      <text x="45" y="175" fill="#102A43" font-size="13" font-weight="800">register</text>
      <rect x="24" y="204" width="132" height="38" rx="12" fill="#FFFFFF" stroke="#C4D9EF"/>
      <text x="52" y="229" fill="#102A43" font-size="13" font-weight="800">check</text>
    </g>

    <g transform="translate(260 112)">
      <path d="M-30 82H8M-30 150H8M-30 218H8" stroke="#1463FF" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="8" y="20" width="202" height="54" rx="16" fill="#FFFFFF" stroke="#B9D5F2"/>
      <text x="30" y="52" fill="#111827" font-size="14" font-weight="850">requirements</text>
      <rect x="8" y="88" width="202" height="54" rx="16" fill="#FFFFFF" stroke="#B9D5F2"/>
      <text x="30" y="120" fill="#111827" font-size="14" font-weight="850">architect + owners</text>
      <rect x="8" y="156" width="202" height="54" rx="16" fill="#FFFFFF" stroke="#B9D5F2"/>
      <text x="30" y="188" fill="#111827" font-size="14" font-weight="850">tester + reviewer</text>
      <rect x="8" y="224" width="202" height="54" rx="16" fill="#111827"/>
      <path d="M34 251L45 262L67 238" stroke="#14B8A6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="256" fill="#FFFFFF" font-size="14" font-weight="850">release archive</text>
    </g>

    <g transform="translate(70 408)">
      <rect width="408" height="42" rx="21" fill="#FFFFFF" stroke="#C4D9EF"/>
      <text x="24" y="27" fill="#1463FF" font-size="13" font-weight="850">Memory Hints</text>
      <text x="134" y="27" fill="#486581" font-size="13" font-weight="700">promoted lessons, selected only when relevant</text>
    </g>
  </g>
</svg>
