archive:
  reminder_required: true
  reminder_file: ".harness/runs/<run>/artifacts/archive-reminder.md"

  git:
    enabled: true
    auto_commit_after_done: true
    stage_mode: "run_tracked_files"
    fallback_stage_mode: "block"
    tracked_files_manifest: ".harness/runs/<run>/logs/changed-files.json"
    always_stage:
      - ".harness/runs/<run>"
      - "<sourceRequirement>"
    skip_when_no_changes: true
    commit_message_template: "chore(harness): archive <run>"
    commit_body:
      - "Run: <run>"
      - "Stage: done"
      - "Generated by harness archive policy."
    audit_file: ".harness/runs/<run>/logs/archive/git-commit.md"
    notes:
      - "Archive commit stages only the current run directory and files recorded in the changed-files manifest by default."
      - "Business code or long-lived product documentation changes must be recorded in the changed-files manifest before archive commit."
      - "Use archive-commit --allow-all-workspace-changes only when intentionally committing the whole worktree."
      - "If the repository has no initial commit, archive commit is skipped with an audit record instead of blocking run closeout."
      - "If there are no changes, archive commit is skipped automatically."
