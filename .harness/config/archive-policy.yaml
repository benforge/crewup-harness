archive:
  reminder_required: true
  reminder_file: ".harness/runs/<run>/artifacts/archive-reminder.md"

  git:
    enabled: true
    auto_commit_after_done: true
    stage_mode: "run_tracked_files"
    fallback_stage_mode: "block"
    tracked_files_manifest: ".harness/runs/<run>/logs/changed-files.json"
    always_stage:
      - ".harness/runs/<run>"
      - "<sourceRequirement>"
    skip_when_no_changes: true
    commit_message_template: "chore(harness): archive <run>"
    commit_body:
      - "Run: <run>"
      - "Stage: done"
      - "Generated by harness archive policy."
    audit_file: ".harness/runs/<run>/logs/archive/git-commit.md"
    notes:
      - "归档提交默认只暂存当前 run 目录、来源 backlog 文件和 changed-files manifest 中记录的文件。"
      - "业务代码或产品长期文档目录变更必须先写入 changed-files manifest，避免误提交其它迭代。"
      - "如果确实要提交整个工作区，必须显式使用 archive-commit 的 --allow-all-workspace-changes。"
      - "没有变更时自动跳过提交。"
