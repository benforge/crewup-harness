project_profile:
  name: "New project"
  package_manager: "npm"
  ai_overlay:
    profile: ".harness/project/ai/profile.yaml"
    rules_root: ".harness/project/ai/rules"
    discovery: "auto"
    local_rule_file: ".ai/rules.md"
    description: "当前项目的 AI overlay；放在 .harness/project/ai 下，只保留公共规则和少量覆盖，app/package scope 默认由本地 .ai/rules.md 和 workspace package 自动发现。"

  commands:
    install: "npm install"
    build: "npm run build"
    test: "npm run test"
    typecheck: "npm run typecheck"
    lint: "npm run lint"

  impact_scopes:
    db:
      agents:
        - "database"
      write_paths:
        - "infra/database/**"
        - "apps/api/**/migrations/**"
      artifacts:
        - ".harness/runs/<run>/artifacts/db-migration.md"

    infra:
      agents:
        - "devops"
      write_paths:
        - "infra/**"
        - ".github/workflows/**"
      artifacts:
        - ".harness/runs/<run>/artifacts/release-summary.md"

    docs:
      agents:
        - "release"
      write_paths:
        - ".harness/runs/<run>/artifacts/release-summary.md"
      artifacts:
        - ".harness/runs/<run>/artifacts/release-summary.md"

  default_agents:
    planning:
      - "requirements"
      - "architect"
    verification:
      - "tester"
      - "reviewer"
      - "release"

  protected_product_docs:
    - "docs/product/**"
