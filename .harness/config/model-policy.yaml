model_profiles:
  low_cost:
    model: "gpt-5.4-mini"
    reasoning_effort: "low"
    codex_model_hint: "gpt-5.4-mini"
    use_for:
      - "routing"
      - "state bookkeeping"
      - "simple documentation/archive summaries"
    notes: "Use for low-risk coordination and rule-based decisions."

  requirements_planning:
    model: "gpt-5.4-mini"
    reasoning_effort: "medium"
    codex_model_hint: "gpt-5.4-mini"
    mode_hint: "plan_only"
    use_for:
      - "requirement expansion"
      - "goal and non-goal clarification"
      - "acceptance criteria drafting"
      - "open question organization"
    notes: "Use before formal requirements when the request needs expansion."

  requirements_strong:
    model: "gpt-5.5"
    reasoning_effort: "medium"
    codex_model_hint: "gpt-5.5"
    use_for:
      - "formal requirement artifacts"
      - "requirement boundary consolidation"
      - "acceptance criteria"
      - "test requirements"
      - "rollback strategy"
    notes: "Requirements agent must use at least gpt-5.5 + medium reasoning."

  standard_analysis:
    model: "gpt-5.4"
    reasoning_effort: "low"
    codex_model_hint: "gpt-5.4"
    use_for:
      - "normal analysis"
      - "impact scope decisions"
      - "DevOps routine planning"
    notes: "Use for normal non-coding analysis."

  architecture_strong:
    model: "gpt-5.5"
    reasoning_effort: "medium"
    codex_model_hint: "gpt-5.5"
    use_for:
      - "architecture design"
      - "technical selection"
      - "directory structure"
      - "module boundaries"
      - "implementation phase breakdown"
    notes: "Architect agent must use at least gpt-5.5 + medium reasoning."

  coding_strong:
    model: "gpt-5.4"
    reasoning_effort: "high"
    codex_model_hint: "gpt-5.3-codex"
    use_for:
      - "code implementation"
      - "cross-file edits"
      - "test fixes"
    notes: "Use for implementation agents."

  tester_standard:
    model: "gpt-5.4"
    reasoning_effort: "medium"
    codex_model_hint: "gpt-5.4"
    use_for:
      - "test execution"
      - "test reports"
      - "regression verification"
    notes: "Use medium reasoning for actual verification."

  review_strong:
    model: "gpt-5.4"
    reasoning_effort: "high"
    codex_model_hint: "gpt-5.4"
    use_for:
      - "code review"
      - "architecture risk review"
      - "security and regression risk review"
    notes: "Use high reasoning for reviewer."

  critical_review:
    model: "gpt-5.5"
    reasoning_effort: "high"
    codex_model_hint: "gpt-5.5"
    use_for:
      - "database migration"
      - "security"
      - "production deployment"
      - "permission model"
      - "high-risk rollback"
    notes: "Use only for explicit high-risk areas."

agent_model_policy:
  main:
    profile: "low_cost"
    fallback_profile: "standard_analysis"
  pm:
    profile: "low_cost"
  requirements-plan:
    profile: "requirements_planning"
  requirements:
    profile: "requirements_strong"
  architect:
    profile: "architecture_strong"
  frontend:
    profile: "coding_strong"
  docs:
    profile: "coding_strong"
  backend:
    profile: "coding_strong"
  database:
    profile: "critical_review"
  devops:
    profile: "standard_analysis"
  tester:
    profile: "tester_standard"
  reviewer:
    profile: "review_strong"
  release:
    profile: "low_cost"

rules:
  - "The main agent uses low_cost for routing and state bookkeeping."
  - "requirements-plan drafts requirement-plan.md only."
  - "requirements owns requirement.md and must use requirements_strong."
  - "architect owns architecture.md and implementation-plan.md and must use architecture_strong."
  - "Code-writing agents use coding_strong."
  - "Database, security, production, and permission-model risks use critical_review or require explicit human confirmation."
  - "Do not skip tester or reviewer to save cost in a strict CrewUp run."
