intake_policy:
  default_entry: "backlog_new"
  require_intake_decision_before_run: true
  write_decision_log: true
  decision_log: ".harness/reports/intake-decision.md"
  activation:
    default: "inactive_until_explicit"
    explicit_signals:
      - "crewup run"
      - "npm run harness:run"
      - "使用 CrewUp"
      - "按 harness 流程"
      - "继续当前 CrewUp run"
      - "继续这个 run"
    rule: "没有显式 CrewUp/harness/run 信号时，不要自动创建 backlog 或 run；普通问答、临时讨论和很小的非正式修补留在 harness 外。"

  entries:
    backlog_new:
      description: "想法、候选需求、未来可能做、范围不清晰或一次提出多个方向时，先进 backlog/new。"
      use_when:
        - "用户说只是想法、以后可能做、先记一下、帮我整理几个方向"
        - "目标、验收标准、影响范围不清晰"
        - "同一句里包含多个相互独立的需求"
      next_step: "由 pm/requirements-plan 整理后移动到 backlog/ready 或创建 run。"

    backlog_ready:
      description: "需求已经可执行，但用户没有要求立刻开始实现时，进入 backlog/ready。"
      use_when:
        - "用户已经明确目标和验收标准"
        - "用户希望排期、稍后做、先放进待办"
      next_step: "用户确认开工后，使用 harness:new-run 创建 run。"

    direct_run:
      description: "用户明确要求现在执行，或明确指定继续某个 run 时，直接创建或选择 run。"
      use_when:
        - "用户明确说现在做、直接实现、马上改、开始开发、继续这个 run"
        - "用户提供了明确 runId"
        - "这是当前正在进行 run 的反馈修正"
      next_step: "如果没有现成 run，先创建 backlog/ready 条目，再由 harness:new-run 创建 run。"

    no_harness:
      description: "简单问答、只读解释、状态查看、很小的非正式文本修补，不创建 backlog/run。"
      use_when:
        - "用户只是询问概念或解释当前 harness"
        - "只读检查，不产生正式项目变更"
        - "很小的非正式文本修改"
      next_step: "main agent 直接回答或轻量处理。"

  explicit_overrides:
    force_backlog:
      phrases:
        - "先放 backlog"
        - "先放到 backlog"
        - "先记一个"
        - "以后再做"
        - "暂时不做"
        - "先整理需求池"
        - "先放待办"
    force_direct_run:
      phrases:
        - "现在就做"
        - "现在做"
        - "直接实现"
        - "马上改"
        - "开始开发"
        - "继续这个 run"
        - "基于这个 run 继续"
        - "开始做"
    force_no_harness:
      phrases:
        - "不要用 harness"
        - "不用 harness"
        - "只回答"
        - "只解释"

  main_agent_rule:
    - "CrewUp 默认不接管所有聊天；只有显式 CrewUp/harness/run 信号才激活。"
    - "正式需求入口必须先做 intake decision，再创建 run。"
    - "没有明确开工信号时，不要直接创建 run。"
    - "直接 run 也必须从 backlog/ready 条目创建，或选择已有 run；不要绕过 backlog 直接写 runs。"
    - "直接 run 不是直接写代码；仍需需求扩写或规划门禁，除非用户明确跳过。"
    - "最终汇总里说明本次选择 backlog 还是 run，以及原因。"
