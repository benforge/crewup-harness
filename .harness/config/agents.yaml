agents:
  pm:
    title: "PM Agent"
    owner: ".harness/agents/pm.md"
    category: "planning"
    default_stage: "intake"
    model_profile: "low_cost"
    scope:
      - "intake triage"
      - "priority and boundary notes"
      - "task split"
      - "development readiness"

  requirements-plan:
    title: "Requirements Plan Agent"
    owner: ".harness/agents/requirements-plan.md"
    category: "planning"
    default_stage: "requirements_plan"
    model_profile: "requirements_planning"
    scope:
      - "interactive requirement clarification"
      - "natural-language requirement expansion"
      - "boundary choices"
      - "goals and non-goals"
      - "acceptance criteria draft"
      - "open questions"

  requirements:
    title: "Requirement Agent"
    owner: ".harness/agents/requirements.md"
    category: "planning"
    default_stage: "requirements_confirm"
    model_profile: "standard_analysis"
    scope:
      - "structured requirement artifact"
      - "acceptance criteria"
      - "goals and non-goals"
      - "dependencies and questions"

  architect:
    title: "Architect Agent"
    owner: ".harness/agents/architect.md"
    category: "planning"
    default_stage: "plan"
    model_profile: "standard_analysis"
    scope:
      - "impact scope"
      - "module boundaries"
      - "technical design"
      - "risk identification"

  frontend:
    title: "Frontend Agent"
    owner: ".harness/agents/frontend.md"
    category: "implementation"
    default_stage: "implement"
    model_profile: "coding_strong"
    impact_flags:
      - "web"
      - "admin"
      - "frontend"
    rule_files:
      - ".harness/rules/frontend.md"
    scope:
      - "frontend architecture"
      - "pages and routes"
      - "components"
      - "state management"
      - "data requests"
      - "forms and interactions"
      - "accessibility and performance"

  docs:
    title: "Docs Agent"
    owner: ".harness/agents/docs.md"
    category: "implementation"
    default_stage: "implement"
    model_profile: "coding_strong"
    impact_flags:
      - "docs"
      - "documentation"
      - "readme"
    rule_files:
      - ".harness/rules/docs.md"
    scope:
      - "README"
      - "project documentation"
      - "usage guide"
      - "integration guide"
      - "configuration guide"
      - "developer guide"

  backend:
    title: "Backend Agent"
    owner: ".harness/agents/backend.md"
    category: "implementation"
    default_stage: "implement"
    model_profile: "coding_strong"
    impact_flags:
      - "api"
      - "backend"
    rule_files:
      - ".harness/rules/backend.md"
    scope:
      - "backend architecture"
      - "service boundaries"
      - "API contracts"
      - "domain logic"
      - "authorization and security"
      - "data access"
      - "error handling"
      - "reliability and performance"

  database:
    title: "Database Agent"
    owner: ".harness/agents/database.md"
    category: "implementation"
    default_stage: "implement"
    model_profile: "critical_review"
    impact_flags:
      - "db"
      - "database"
    rule_files:
      - ".harness/rules/database.md"
    scope:
      - "table structure"
      - "migrations"
      - "indexes"
      - "data consistency"

  devops:
    title: "DevOps Agent"
    owner: ".harness/agents/devops.md"
    category: "implementation"
    default_stage: "implement"
    model_profile: "standard_analysis"
    impact_flags:
      - "infra"
      - "devops"
    rule_files:
      - ".harness/rules/devops.md"
    scope:
      - "Docker"
      - "CI/CD"
      - "environment variables"
      - "deployment and rollback"

  tester:
    title: "Tester Agent"
    owner: ".harness/agents/tester.md"
    category: "verification"
    default_stage: "verify"
    model_profile: "tester_standard"
    rule_files:
      - ".harness/rules/tester.md"
    scope:
      - "unit tests"
      - "integration tests"
      - "E2E"
      - "test report"

  reviewer:
    title: "Reviewer Agent"
    owner: ".harness/agents/reviewer.md"
    category: "review"
    default_stage: "review"
    model_profile: "review_strong"
    rule_files:
      - ".harness/rules/reviewer.md"
      - ".harness/rules/security.md"
    scope:
      - "code review"
      - "security risks"
      - "regression risks"
      - "definition of done"

  release:
    title: "Release Agent"
    owner: ".harness/agents/release.md"
    category: "release"
    default_stage: "release"
    model_profile: "low_cost"
    scope:
      - "release summary"
      - "change log"
      - "deployment checks"
      - "rollback notes"
