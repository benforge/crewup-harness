external_skill_candidates:
  frontend-design:
    source: "https://www.modelscope.cn/skills/@anthropics/frontend-design"
    marketplace_ref: "anthropics/skills@frontend-design"
    status: "installable_candidate"
    roles:
      - "frontend"
      - "reviewer"
    install_command: "npx skills add https://www.modelscope.cn/skills/@anthropics/frontend-design -a codex --copy -y"
    use_when: "Frontend implementation or UX review needs stronger visual hierarchy, composition, interaction, and polish guidance."
    note: "Do not assume this is active only because .agents/skills/frontend-design exists; verify with `npx skills list --json` and restart Codex when needed."

  tailwind-design-system:
