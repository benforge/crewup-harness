external_skill_candidates:
  frontend-design:
    source: "https://www.modelscope.cn/skills/@anthropics/frontend-design"
    marketplace_ref: "anthropics/skills@frontend-design"
    status: "installable_candidate"
    roles:
      - "frontend"
      - "reviewer"
    install_command: "npx skills add https://www.modelscope.cn/skills/@anthropics/frontend-design -a codex --copy -y"
    use_when: "Frontend implementation or UX review needs stronger visual hierarchy, composition, interaction, and polish guidance."
    note: "Do not assume this is active only because .agents/skills/frontend-design exists; verify with `npx skills list --json` and restart Codex when needed."

  web-design-guidelines:
    source: "skills marketplace search result"
    marketplace_ref: "vercel-labs/agent-skills@web-design-guidelines"
    status: "installable_candidate"
    roles:
      - "frontend"
      - "requirements"
      - "architect"
      - "reviewer"
    install_command: "npx skills add vercel-labs/agent-skills --skill web-design-guidelines -a codex --copy -y"
    use_when: "Modern web page layout, content-site rhythm, and visual guideline support are needed."

  tailwind-design-system:
    source: "skills marketplace search result"
    marketplace_ref: "wshobson/agents@tailwind-design-system"
    status: "installable_candidate"
    roles:
      - "frontend"
      - "reviewer"
    install_command: "npx skills add wshobson/agents --skill tailwind-design-system -a codex --copy -y"
    use_when: "Tailwind token, spacing, utility organization, and design-system consistency need explicit support."
