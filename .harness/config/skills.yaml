skill_policy:
  purpose: "Centralize skill references for harness agents without treating references as installed tools."
  rules:
    - "`npx skills find` only discovers candidate skills; it does not install them."
    - "A skill listed in this file is guidance for agents, not proof that the skill is installed or active."
    - "Before a run requires an external skill, verify it with `npx skills list --json` or the current Codex skill list."
    - "If a skill is not verified as active, agents may only use the written guidance in this file or the checked-in docs as normal context."
    - "Optional plugins and MCP tools such as Context7, Playwright, Figma, Browser, or cloud CLIs must never be treated as required just because a role label mentions them."
    - "When an optional plugin or MCP tool is unavailable, continue with local project evidence, checked-in documentation, official docs links, or a clearly documented fallback."
    - "Do not paste long 'Skill candidates' blocks into run inputs, artifacts, or per-agent prompts. Reference this config instead."
  install_locations:
    project: ".agents/skills/<skill-name>/SKILL.md"
    codex_user: "%USERPROFILE%/.codex/skills/<skill-name>/SKILL.md"
  placement:
    harness_config: ".harness/config/skills.yaml declares skill routing and candidates; it is not an installation directory."
    harness_sop: ".harness/skills/*.md stores internal Harness SOPs only."
    project_skill: ".agents/skills/<skill-name>/SKILL.md stores project-level reproducible skills."
    user_global_skill: "%USERPROFILE%/.codex/skills/<skill-name>/SKILL.md stores personal cross-project skills."
    adapter_dirs: ".cursor, Claude, and similar tool directories are optional adapters, not the Harness source of truth."
  prompt_hygiene:
    - "Generated prompts should include only the skills relevant to the target agent role."
    - "Run artifacts should record decisions and acceptance criteria, not repeat skill marketplace search results."

internal_skill_sops:
  build:
    path: ".harness/skills/build.md"
    roles:
      - "frontend"
      - "backend"
      - "database"
      - "devops"
      - "tester"
  test:
    path: ".harness/skills/test.md"
    roles:
      - "frontend"
      - "backend"
      - "tester"
      - "reviewer"
  ui-verify:
    path: ".harness/skills/ui-verify.md"
    roles:
      - "frontend"
      - "tester"
      - "reviewer"
  release-check:
    path: ".harness/skills/release-check.md"
    roles:
      - "tester"
      - "reviewer"
      - "release"

