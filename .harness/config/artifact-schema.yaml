artifacts:
  requirement-plan.md:
    owner: "requirements-plan"
    required_headings:
      - "Original Request Summary"
      - "Historical Context"
      - "Goals"
      - "Non-Goals"
      - "Acceptance Criteria Draft"
      - "Impact Scope Candidates"
      - "Open Questions"

  requirement.md:
    owner: "requirements"
    required_headings:
      - "Background"
      - "Historical Context"
      - "Reused Historical Decisions"
      - "Conflicts Or Changes From History"
      - "Goals"
      - "Non-Goals"
      - "Acceptance Criteria"
      - "Impact Scope"
      - "Test Requirements"
      - "Rollback Strategy"

  architecture.md:
    owner: "architect"
    required_headings:
      - "Impact Scope"
      - "Historical Architecture Constraints"
      - "Design"
      - "Decisions Extended Replaced Or Added"
      - "Risks"

  implementation-plan.md:
    owner: "architect"
    required_headings:
      - "Task Summary"
      - "Files And Modules"
      - "Steps"
      - "Test Plan"
      - "Completion Checklist"

  api-change.md:
    owner: "backend"
    required_headings:
      - "API Impact"

  db-migration.md:
    owner: "database"
    required_headings:
      - "Database Impact"

  test-report.md:
    owner: "tester"
    required_headings:
      - "Run"
      - "Result Summary"
      - "Executed Checks"
      - "Passed Checks"
      - "Failed Or Blocked Checks"
      - "Uncovered Risks"

  review-report.md:
    owner: "reviewer"
    required_headings:
      - "Conclusion"
      - "Blocking Issues"
      - "Non-Blocking Suggestions"
      - "Risks"
      - "Test Gaps"
      - "Definition Of Done"

  release-summary.md:
    owner: "release"
    required_headings:
      - "Changes"
      - "Deployment Steps"
      - "Rollback Strategy"
