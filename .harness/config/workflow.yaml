workflow:
  name: "CrewUp formal AI engineering workflow"
  version: "0.2.0"
  language: "zh-CN"
  primary_runner: "native-subagents"
  fallback_runners:
    - "desktop-prompts"
    - "api-orchestrate"
    - "blocked-waiting-for-subagents"

  state_file: ".harness/runs/<run>/state.json"
  transition_log: ".harness/runs/<run>/logs/transitions.md"

  stages:
    - id: "intake"
      name: "Intake"
      owner: "main"
      input: "Original user request"
      output: "new run or existing run"
      gate: "intake_decision"

    - id: "requirements_plan"
      name: "Requirements planning"
      owner: "requirements-plan"
      input: ".harness/runs/<run>/input.md"
      output: ".harness/runs/<run>/artifacts/requirement-plan.md"
      gate: "requirement_plan_created"

    - id: "requirements_confirm"
      name: "Requirements confirmation"
      owner: "requirements"
      input: ".harness/runs/<run>/artifacts/requirement-plan.md"
      output: ".harness/runs/<run>/artifacts/requirement.md"
      gate: "requirement_promoted_or_confirmed"

    - id: "plan"
      name: "Architecture and implementation planning"
      owner: "architect"
      input: ".harness/runs/<run>/artifacts/requirement.md"
      output: ".harness/runs/<run>/artifacts/architecture.md and implementation-plan.md"
      gate: "planning_artifacts_ready"

    - id: "implement"
      name: "Implementation"
      owner: "implementation_agents"
      input: ".harness/runs/<run>/artifacts/implementation-plan.md"
      output: "Business code, tests, and implementation notes"
      gate: "user_approved_implementation"

    - id: "verify"
      name: "Verification"
      owner: "tester"
      input: "Business code and test plan"
      output: ".harness/runs/<run>/artifacts/test-report.md"
      gate: "verification_recorded"

    - id: "review"
      name: "Review"
      owner: "reviewer"
      input: "Code diff, run artifacts, and test report"
      output: ".harness/runs/<run>/artifacts/review-report.md"
      gate: "review_passed"

    - id: "release"
      name: "Release preparation"
      owner: "release"
      input: "Reviewed changes"
      output: ".harness/runs/<run>/artifacts/release-summary.md"
      gate: "release_summary_ready"

    - id: "done"
      name: "Done and archived"
      owner: "main"
      input: "Run that passed tests, review, and release gates"
      output: "RUN_SUMMARY.md, report, archive summary, optional product sync"
      gate: "done_definition_met"

  transitions:
    intake:
      allowed_next:
        - "requirements_plan"
        - "requirements_confirm"
        - "plan"
    requirements_plan:
      allowed_next:
        - "requirements_confirm"
    requirements_confirm:
      allowed_next:
        - "plan"
    plan:
      allowed_next:
        - "implement"
    implement:
      allowed_next:
        - "verify"
    verify:
      allowed_next:
        - "review"
    review:
      allowed_next:
        - "release"
    release:
      allowed_next:
        - "done"
    done:
      allowed_next: []

  confirmations:
    before_implement:
      required: true
      evidence_field: "confirmations.implementation_approved_at"
    before_product_sync:
      required: true
      evidence_field: "confirmations.product_sync_approved_at"
      note: "transition --to=done records this confirmation and runs product-sync when product sync is enabled."

  stage_entry_gates:
    requirements_confirm:
      required_agents:
        - "requirements-plan"
      required_artifacts:
        - "requirement-plan.md"
      require_artifact_provenance: true
    plan:
      required_agents:
        - "requirements"
      required_artifacts:
        - "requirement.md"
      require_artifact_provenance: true
    implement:
      required_agents:
        - "architect"
      required_artifacts:
        - "requirement.md"
        - "architecture.md"
        - "implementation-plan.md"
      require_user_confirmation: "implementation_approved_at"
      require_artifact_provenance: true
    verify:
      required_agents:
        - "implementation_agents"
      require_changed_files_recorded: true
    review:
      required_agents:
        - "tester"
      required_artifacts:
        - "test-report.md"
      require_artifact_provenance: true
    release:
      required_agents:
        - "reviewer"
      required_artifacts:
        - "review-report.md"
      require_artifact_provenance: true
    done:
      required_agents:
        - "release"
      required_artifacts:
        - "test-report.md"
        - "review-report.md"
        - "release-summary.md"
      require_artifact_provenance: true
      require_native_agents_closed: true

  status_values:
    - "in-progress"
    - "waiting_user"
    - "blocked"
    - "done"
    - "archived"

  workflow_profiles:
    discovery:
      description: "Formal no-code discovery for a new project, directory structure, technology choices, module boundaries, and phased roadmap."
      run_type: "discovery"
      no_code: true
      default_agents:
        - "requirements-plan"
        - "requirements"
        - "architect"
        - "reviewer"
      required_gates:
        - "project_shape_documented"
        - "module_boundaries_defined"
        - "next_runs_suggested"
        - "no_business_code_changes"
    plan_only:
      description: "Formal no-code flow for requirements, architecture, or implementation planning without business-code implementation."
      run_type: "plan_only"
      no_code: true
      default_agents:
        - "requirements-plan"
        - "requirements"
        - "architect"
        - "reviewer"
      required_gates:
        - "acceptance_criteria_ready"
        - "planning_artifacts_ready"
        - "review_recorded"
        - "no_business_code_changes"
    lite:
      description: "Narrow formal implementation run, not quick mode; still keeps delegated implementation agents, tester, reviewer, release, gate-check, report, and finish."
      run_type: "implementation"
      no_code: false
      default_agents:
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "impact_scope_known"
        - "verification_recorded"
        - "review_recorded"
    standard:
      description: "Normal formal feature/change run with requirements, architecture, implementation, verification, review, and release summary."
      run_type: "feature"
      no_code: false
      default_agents:
        - "requirements"
        - "architect"
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "acceptance_criteria_ready"
        - "implementation_approved"
        - "verification_recorded"
        - "review_passed"
        - "release_summary_ready"
    full:
      description: "High-risk or cross-module formal run with full requirements clarification, architecture, implementation, testing, review, and release flow."
      run_type: "feature"
      no_code: false
      default_agents:
        - "requirements-plan"
        - "requirements"
        - "architect"
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "risk_reviewed"
        - "manual_approval_recorded"
        - "rollback_documented"
        - "native_results_recorded"
