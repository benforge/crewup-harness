workflow:
  name: "通用 AI 协作工作流"
  version: "0.2.0"
  language: "zh-CN"
  primary_runner: "native-subagents"
  fallback_runners:
    - "desktop-prompts"
    - "api-orchestrate"
    - "blocked-waiting-for-subagents"

  state_file: ".harness/runs/<run>/state.json"
  transition_log: ".harness/runs/<run>/logs/transitions.md"

  stages:
    - id: "intake"
      name: "需求入口判断"
      owner: "main"
      input: "用户原始请求"
      output: ".harness/backlog/new/*.md 或 .harness/backlog/ready/*.md 或 existing run"
      gate: "intake_decision"

    - id: "requirements_plan"
      name: "需求扩写"
      owner: "requirements-plan"
      input: ".harness/runs/<run>/input.md"
      output: ".harness/runs/<run>/artifacts/requirement-plan.md"
      gate: "requirement_plan_created"

    - id: "requirements_confirm"
      name: "需求确认"
      owner: "main"
      input: ".harness/runs/<run>/artifacts/requirement-plan.md"
      output: ".harness/runs/<run>/artifacts/requirement.md"
      gate: "requirement_promoted_or_confirmed"

    - id: "plan"
      name: "架构与实施计划"
      owner: "architect"
      input: ".harness/runs/<run>/artifacts/requirement.md"
      output: ".harness/runs/<run>/artifacts/architecture.md 和 implementation-plan.md"
      gate: "planning_artifacts_ready"

    - id: "implement"
      name: "实现"
      owner: "implementation_agents"
      input: ".harness/runs/<run>/artifacts/implementation-plan.md"
      output: "业务代码、测试和变更说明 artifacts"
      gate: "user_approved_implementation"

    - id: "verify"
      name: "验证"
      owner: "tester"
      input: "业务代码和测试计划"
      output: ".harness/runs/<run>/artifacts/test-report.md"
      gate: "verification_recorded"

    - id: "review"
      name: "审查"
      owner: "reviewer"
      input: "代码 diff、run artifacts、测试报告"
      output: ".harness/runs/<run>/artifacts/review-report.md"
      gate: "review_passed"

    - id: "release"
      name: "发布准备"
      owner: "release"
      input: "已通过审查的变更"
      output: ".harness/runs/<run>/artifacts/release-summary.md"
      gate: "release_summary_ready"

    - id: "done"
      name: "完成归档"
      owner: "main"
      input: "通过测试、审查和发布门禁的 run"
      output: "backlog/done 或 product sync"
      gate: "done_definition_met"

  transitions:
    intake:
      allowed_next:
        - "requirements_plan"
        - "requirements_confirm"
        - "plan"
    requirements_plan:
      allowed_next:
        - "requirements_confirm"
    requirements_confirm:
      allowed_next:
        - "plan"
    plan:
      allowed_next:
        - "implement"
    implement:
      allowed_next:
        - "verify"
    verify:
      allowed_next:
        - "review"
    review:
      allowed_next:
        - "release"
    release:
      allowed_next:
        - "done"
    done:
      allowed_next: []

  confirmations:
    before_implement:
      required: true
      evidence_field: "confirmations.implementation_approved_at"
    before_product_sync:
      required: true
      evidence_field: "confirmations.product_sync_approved_at"
      note: "transition --to=done 会自动记录该确认并执行 product-sync。"

  stage_entry_gates:
    requirements_confirm:
      required_agents:
        - "requirements-plan"
      required_artifacts:
        - "requirement-plan.md"
      require_artifact_provenance: true
    plan:
      required_agents:
        - "requirements"
      required_artifacts:
        - "requirement.md"
      require_artifact_provenance: true
    implement:
      required_agents:
        - "architect"
      required_artifacts:
        - "requirement.md"
        - "architecture.md"
        - "implementation-plan.md"
      require_user_confirmation: "implementation_approved_at"
      require_artifact_provenance: true
    verify:
      required_agents:
        - "implementation_agents"
      require_changed_files_recorded: true
    review:
      required_agents:
        - "tester"
      required_artifacts:
        - "test-report.md"
      require_artifact_provenance: true
    release:
      required_agents:
        - "reviewer"
      required_artifacts:
        - "review-report.md"
      require_artifact_provenance: true
    done:
      required_agents:
        - "release"
      required_artifacts:
        - "test-report.md"
        - "review-report.md"
        - "release-summary.md"
      require_artifact_provenance: true
      require_native_agents_closed: true

  status_values:
    - "in-progress"
    - "waiting_user"
    - "blocked"
    - "done"
    - "archived"

  workflow_profiles:
    discovery:
      description: "新项目、目录结构、技术选型、模块边界和阶段路线规划；只产出规划，不写业务代码。"
      run_type: "discovery"
      no_code: true
      default_agents:
        - "requirements-plan"
        - "requirements"
        - "architect"
        - "reviewer"
      required_gates:
        - "project_shape_documented"
        - "module_boundaries_defined"
        - "next_runs_suggested"
        - "no_business_code_changes"
    plan_only:
      description: "明确要求只做方案、需求、架构或实施计划；不进入业务代码实现。"
      run_type: "plan_only"
      no_code: true
      default_agents:
        - "requirements-plan"
        - "requirements"
        - "architect"
        - "reviewer"
      required_gates:
        - "acceptance_criteria_ready"
        - "planning_artifacts_ready"
        - "review_recorded"
        - "no_business_code_changes"
    lite:
      description: "小范围正式变更的严格短路径，不是 quick mode；仍保留实现 agent、tester、reviewer、release、gate-check、report 和 finish。"
      run_type: "implementation"
      no_code: false
      default_agents:
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "impact_scope_known"
        - "verification_recorded"
        - "review_recorded"
    standard:
      description: "常规功能迭代；需求、方案、实现、验证、审查、发布摘要闭环。"
      run_type: "feature"
      no_code: false
      default_agents:
        - "requirements"
        - "architect"
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "acceptance_criteria_ready"
        - "implementation_approved"
        - "verification_recorded"
        - "review_passed"
        - "release_summary_ready"
    full:
      description: "高风险或跨模块变更；完整 PM/需求/架构/实现/测试/审查/发布流程。"
      run_type: "feature"
      no_code: false
      default_agents:
        - "pm"
        - "requirements"
        - "architect"
        - "tester"
        - "reviewer"
        - "release"
      required_gates:
        - "risk_reviewed"
        - "manual_approval_recorded"
        - "rollback_documented"
        - "native_results_recorded"
