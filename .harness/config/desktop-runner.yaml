desktop_runner:
  mode: "codex-desktop-tabs"
  goal: "使用 Codex Desktop 子 agent tabs 执行开发任务，同时用 harness 保存任务、产物、验证和审计。"

  execution_groups:
    - id: "intake"
      parallel: false
      agents:
        - "pm"
        - "requirements"
        - "architect"

    - id: "implementation"
      parallel: true
      agents:
        - "frontend"
        - "backend"
        - "database"
        - "devops"

    - id: "verification"
      parallel: false
      agents:
        - "tester"
        - "reviewer"
        - "release"

  spawn_rules:
    - "正式项目需求默认由主 agent 调度、子 agent 执行；主 agent 不独自完成完整需求分析、架构规划或开发实现。"
    - "需求分析默认委派 requirements，技术方案默认委派 architect，开发实现默认委派对应开发 agent。"
    - "主 agent 先读取 run 的 input、tasks、artifacts、model-policy、write-policy、risk-policy。"
    - "启动新子 agent 前，主 agent 必须检查现有子 agent tabs；同角色同上下文优先复用，已完成且不再需要的 agent 必须关闭。"
    - "进入下一阶段前，主 agent 必须清理上一阶段已完成 agent，避免线程额度耗尽。"
    - "如果线程额度已满，必须先 wait/close/reuse；清理后仍无法启动必要 agent 时，记录阻塞并请求用户确认，不直接越职接管。"
    - "只把边界清晰、互不阻塞的任务委派给子 agent。"
    - "前置任务未完成时，不启动依赖它的后置任务。"
    - "PM、Requirements、Architect 完成后必须先让用户审核需求、方案和实施计划；用户确认继续后才启动 implementation 组。"
    - "子 agent 必须把结果写回 logs/desktop-agents/<agent>.result.md，或在最终回复中给主 agent 汇总。"
    - "开发类子 agent 可以修改文件，但必须遵守 task 的允许修改范围和 write-policy。"
    - "PM、Requirements、Architect、Reviewer、Release 默认不直接写业务代码。"
    - "需求规划、设计方案和实施路线图写入 run artifacts；产品长期文档目录只在 release 完成并经用户确认后同步。"

  visible_outputs:
    - "右侧 tabs 中的子 agent 对话"
    - ".harness/runs/<run-id>/logs/desktop-agents/*.prompt.md"
    - ".harness/runs/<run-id>/logs/desktop-agents/*.result.md"
    - ".harness/runs/<run-id>/artifacts/*.md"
    - ".harness/dashboard/index.html"
