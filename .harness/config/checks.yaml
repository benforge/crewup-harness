checks:
  - id: "harness-check"
    name: "Harness structure and config check"
    command: "node .harness/scripts/check.mjs"
    required: true
    when_script_exists: null

  - id: "lint"
    name: "Lint"
    command: "npm run lint"
    required: false
    when_script_exists: "lint"

  - id: "typecheck"
    name: "Typecheck"
    command: "npm run typecheck"
    required: false
    when_script_exists: "typecheck"

  - id: "test"
    name: "Test"
    command: "npm run test"
    required: false
    when_script_exists: "test"

  - id: "build"
    name: "Build"
    command: "npm run build"
    required: false
    when_script_exists: "build"

