checks:
  - id: "harness-check"
    name: "Harness structure and config check"
    command: "npm run harness:check"
    required: true
    when_script_exists: null

  - id: "skill-report"
    name: "Harness skill inventory report"
    command: "npm run harness:skills"
    required: false
    when_script_exists: "harness:skills"

  - id: "skill-audit"
    name: "Installed skill audit"
    command: "npm run harness:skills:audit"
    required: false
    when_script_exists: "harness:skills:audit"

  - id: "lint"
    name: "Lint"
    command: "npm run lint"
    required: false
    when_script_exists: "lint"

  - id: "typecheck"
    name: "Typecheck"
    command: "npm run typecheck"
    required: false
    when_script_exists: "typecheck"

  - id: "test"
    name: "Test"
    command: "npm run test"
    required: false
    when_script_exists: "test"

  - id: "build"
    name: "Build"
    command: "npm run build"
    required: false
    when_script_exists: "build"
