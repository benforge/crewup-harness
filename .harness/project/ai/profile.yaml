ai_project:
  version: "0.3.0"
  name: "New project"
  description: "当前博客项目的 AI 协作 overlay。仓库级 profile 只保留公共规则和少量覆盖；app/package scope 由本地 .ai/rules.md、package.json 和 workspace 结构自动发现。"

  discovery:
    enabled: true
    local_rule_file: ".ai/rules.md"
    note: "移动或新增应用/包时，把 .ai/rules.md 跟着代码放置即可；脚本会结合 package.json/workspaces 和递归发现结果生成 scopes，通常不需要同步维护本文件。"

  language:
    communication: "zh-CN"
    artifacts: "zh-CN"
    summaries: "zh-CN"
    code_comments: "zh-CN"
    allow_english_for:
      - "code identifiers"
      - "file paths"
      - "API names"
      - "library names"
      - "commands"
      - "error messages"

  rules:
    common:
      - ".harness/project/ai/rules/language.md"
      - ".harness/project/ai/rules/domain-blog.md"
    roles:
      tester:
        - ".harness/project/ai/rules/testing.md"
      reviewer:
        - ".harness/project/ai/rules/testing.md"
