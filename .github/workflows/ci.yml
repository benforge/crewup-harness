name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  harness:
    name: Harness 检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 检查 harness 结构
        run: npm run harness:check

      - name: 类型检查
        run: npm run typecheck

      - name: 测试
        run: npm run test

      - name: 构建
        run: npm run build
