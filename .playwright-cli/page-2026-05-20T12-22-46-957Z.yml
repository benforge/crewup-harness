        - generic [ref=e29]:
          - paragraph [ref=e30]: 第一轮改造不追求功能数量，而是确认读者进入站点后能快速判断三件事：作者是谁、内容写什么、从哪里开始读。
          - heading "先收敛入口" [level=2] [ref=e31]
          - paragraph [ref=e32]: 首页只保留首页、文章和关于三个主入口。分类和标签通过文章元信息进入，避免把导航做成后台菜单。
          - heading "再稳定阅读" [level=2] [ref=e33]
          - paragraph [ref=e34]: 文章详情页需要把标题、摘要、发布时间、分类、标签和阅读时间放在正文前。代码块必须可横向滚动，不能撑破移动端。
          - code [ref=e36]: const primaryNavigation = ["首页", "文章", "关于"];
          - heading "最后补齐状态" [level=2] [ref=e37]
          - paragraph [ref=e38]: 空态和 404 不应该只是“暂无数据”。它们要说明发生了什么，以及读者下一步还能去哪里。
