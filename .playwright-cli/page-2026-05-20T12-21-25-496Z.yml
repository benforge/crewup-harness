        - complementary "阅读线索" [ref=e25]:
          - strong [ref=e26]: 阅读线索
          - paragraph [ref=e27]: 文章总结工程师技术站 P0 阶段需要先补齐内容模型、发现路径和验证策略。
        - generic [ref=e28]:
          - paragraph [ref=e29]: 博客系统不只是文章列表。面向工程师读者的技术站，需要让内容可信、可扫描、可归档，并且在失败时仍然有明确去向。
          - heading "内容模型" [level=2] [ref=e30]
          - paragraph [ref=e31]: 文章至少需要标题、slug、摘要、正文、分类、标签、发布时间和更新时间。管理端可以继续迭代，但公开站必须只展示已发布内容。
          - heading "发现路径" [level=2] [ref=e32]
          - paragraph [ref=e33]: 分类负责长期主题，比如工程实践和架构思考。标签负责横向索引，比如 Next.js、TypeScript、CI/CD 和性能优化。
          - heading "可验证性" [level=2] [ref=e34]
          - paragraph [ref=e35]: 每次体验改造都应该跑类型检查和构建检查。视觉上也要检查移动端是否横向溢出，代码块是否撑破正文宽度。
          - list [ref=e36]:
            - listitem [ref=e37]: 首页回答作者和内容方向。
            - listitem [ref=e38]: 列表回答有哪些内容以及如何判断是否打开。
            - listitem [ref=e39]: 详情页回答如何专注读完并继续阅读相关内容。
